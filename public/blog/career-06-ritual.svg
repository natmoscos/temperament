<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">기질별 커리어 성장 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">네 기질에 최적화된 4단계 실전 전략 · 지금 1개부터 시작</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#f43f5e">🌟 다혈질 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 3년 단위 커리어 이야기 만들기 (브랜드 서사)</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 번아웃 방지 루틴이 최대 자산 — 월 2일 휴식 강제</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 관계 자본은 투자가치 → 동료 식사·네트워킹</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 돈보다 의미 우선하되, 40대까진 기본급 방어</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0891b2">⚡ 담즙질 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 3~5년 이직 사이클 · 협상 프레임 연습</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 시장가치 데이터베이스 관리 (링크드인 + 레퍼런스)</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 부하 직원 번아웃 감시 — 성과 지속성 확보</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 건강 투자 필수 — 40대 급격 쇠퇴 예방</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#059669">🌾 점액질 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 자격증·면허 축적 = 장기 경쟁력</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 연봉 협상 연습 3회/년 — 암묵적 낮춤 방지</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 안정적 대기업보다 "안정 + 의미" 찾기</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 15년차에 전문가 독립 옵션 준비</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0e7490">🌙 우울질 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 깊이 우선 전략 — 한 분야 10년 이상</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 자기 PR 약점 보완 — 외부 매체 5회/년 기고</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 완벽주의 조기 마감 — "80% 완성 후 공개"</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 팀장보다 전문가 트랙이 유리</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 커리어 리포트</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0b3d"/>
      <stop offset="55%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow-a" cx="85%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="900" fill="url(#bg-a)"/>
  <rect width="1200" height="900" fill="url(#glow-a)"/>

  <!-- 뱃지 (상단) -->
  <rect x="70" y="80" rx="8" width="280" height="52" fill="#00e5ff"/>
  <text x="210" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#0a0a0a" letter-spacing="1">⚡ 본인 입으로 공개</text>

  <!-- 이름 -->
  <text x="70" y="230" font-size="86" font-weight="900" fill="#ffffff" letter-spacing="-3">IVE 안유진</text>

  <!-- 반전 섹션: ENFP? 아냐 (취소선 글자 중앙 통과) -->
  <text x="70" y="345" font-size="64" font-weight="900" fill="#ffffff" opacity="0.85" letter-spacing="-2">ENFP? 아냐</text>
  <line x1="55" y1="327" x2="490" y2="327" stroke="#00e5ff" stroke-width="10"/>

  <!-- ISTP 초대형 -->
  <text x="70" y="690" font-size="260" font-weight="900" fill="#00e5ff" letter-spacing="-8" stroke="#0a0a0a" stroke-width="2">ISTP</text>

  <!-- 우측 원형 포인트 스티커 (중심 980,450 반경 135) -->
  <circle cx="980" cy="450" r="135" fill="#ffffff" opacity="0.06"/>
  <circle cx="980" cy="450" r="135" fill="none" stroke="#00e5ff" stroke-width="4"/>
  <text x="980" y="400" text-anchor="middle" font-size="22" font-weight="900" fill="#00e5ff" letter-spacing="1">IVE 두 센터</text>
  <text x="980" y="440" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">장원영 ENTJ</text>
  <text x="980" y="470" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff" opacity="0.7">+</text>
  <text x="980" y="500" text-anchor="middle" font-size="24" font-weight="900" fill="#00e5ff">안유진 ISTP</text>
  <text x="980" y="532" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff" opacity="0.85">둘 다 T</text>

  <!-- 하단 태그라인 -->
  <rect x="70" y="780" width="14" height="58" fill="#00e5ff"/>
  <text x="100" y="810" font-size="26" font-weight="900" fill="#ffffff">IVE 리더의 냉철한 장인 기질</text>
  <text x="100" y="842" font-size="18" font-weight="700" fill="#ffffff" opacity="0.85">장원영 ENTJ와 같은 T, 다른 결 · Ti-Se 조합 해부</text>

  <!-- 우하단 브랜드 -->
  <text x="1130" y="862" text-anchor="end" font-size="16" font-weight="800" fill="#00e5ff" opacity="0.9">192types.co.kr</text>
</svg>
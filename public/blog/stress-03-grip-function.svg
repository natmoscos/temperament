<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">그립(Grip) 기능 — 네 민낯이 튀어나오는 순간</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">극심한 스트레스에서 열등기능이 폭주하면 "평소의 나"와 정반대 모습이 드러나</text>

  
      <rect x="60" y="115" width="555" height="80" rx="14" fill="#ecfeff" stroke="#e5e7eb"/>
      <rect x="60" y="115" width="7" height="80" rx="3" fill="#0891b2"/>
      <text x="82" y="147" font-size="24" font-weight="800" fill="#0891b2">INTJ</text>
      <text x="82" y="172" font-size="17" font-weight="600" fill="#374151">열등 Se 폭주 → 폭식·충동쇼핑</text>
    

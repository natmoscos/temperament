      <text x="82" y="837" font-size="17" font-weight="600" fill="#374151">열등 Ni 폭주 → 음모론·부정 예측</text>
    
      <rect x="640" y="780" width="555" height="80" rx="14" fill="#fffbeb" stroke="#e5e7eb"/>

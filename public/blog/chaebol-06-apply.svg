<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">한국 사회 맞춤 유형별 커리어 가이드</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">글로벌 공식과 다른 한국 특수 환경에 맞는 전략</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0891b2">🇰🇷 한국 NT형 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INTJ · INTP · ENTJ · ENTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 개인 카리스마 &lt; 조직 내 영향력</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 공개 행보보다 내부 신뢰 구축</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 승진 타이밍 = 집단 합의 타이밍</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 관계 정치 10% 의식 배분</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#e11d48"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#e11d48">✨ 한국 NF형 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INFJ · INFP · ENFJ · ENFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 감정 공감 강점 → HR · 교육 · 브랜드</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 집단 조화 속에서 본인 가치 공유</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 의미 · 가치 중심 커리어 설계</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ NT 리더 아래 파트너 포지션 최적</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#059669">🏦 한국 SJ형 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISTJ · ISFJ · ESTJ · ESFJ</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 한국 사회 가장 잘 맞는 기질</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 공무원 · 전문직 · 대기업 최적</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 장기 안정 + 꾸준 승진</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 규칙 준수 문화가 강점</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#d97706"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#d97706">🚀 한국 SP형 커리어 전략</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISTP · ISFP · ESTP · ESFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 실전 감각 강점 → 세일즈 · 부동산 · 미디어</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 한국 대기업보단 자율 환경</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 스타트업 · 프리랜서 · 창업</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 실시간 네트워크 강점 활용</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 경제학 리포트</text>
</svg>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0e7490">🌙 우울질 공부 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 전체 구조부터 → 세부 나중에</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 60분 집중 + 10분 사색 리듬</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 조용한 1인 공간 절대 필수</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 완벽주의 조기 마감 — 80% 완성 후 공개</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 공부법 리포트</text>
</svg>
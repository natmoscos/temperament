<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">기질별 공부 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">시험 D-30부터 적용 가능 · 기질 최적화 4단계</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#f43f5e">🌟 다혈질 공부 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 15분 타이머 + 5분 쉬기 반복</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 스터디 그룹 필수 — 혼자 집중 실패율 80%</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 관심 과목부터 시작 → 약점 과목 에너지 남을 때</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 설명하기 공부법 — 친구/인형/카메라에</text>
        
      </g>
    
      <g transform="translate(620,115)">

        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0891b2">⚡ 담즙질 공부 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 목표 수치화 — 주간 분량 + 시험 목표 점수</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 15~30분 폭발 집중 + 짧은 재시작</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 과부하 경계 — 체력 분배 필수</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 경쟁 요소 활용 — 모의고사 랭킹 등</text>
        
      </g>
    
      <g transform="translate(60,490)">

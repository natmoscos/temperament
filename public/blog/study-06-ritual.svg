          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 하루 같은 시간 · 같은 자리 고정</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 2시간+ 장시간 집중 가능 활용</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 반복 회독 3~5회 — 이게 핵심 강점</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 시험 직전 새로운 교재 금지</text>
        
      </g>
    
      <g transform="translate(620,490)">

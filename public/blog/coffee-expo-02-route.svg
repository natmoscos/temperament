<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#faf8f5"/>

  <text x="600" y="130" text-anchor="middle" font-size="48" font-weight="900" fill="#1a1a1a">기질별 커피엑스포 관람 동선</text>
  <rect x="500" y="160" width="200" height="6" fill="#6366f1"/>
  
        <rect x="100" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
        <circle cx="150" cy="280" r="30" fill="#6366f1"/>
        <text x="150" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">NT</text>
        <text x="200" y="290" font-size="30" font-weight="900" fill="#1a1a1a">분석가형</text>
        <foreignObject x="140" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">스페셜티 로스터 → 추출 신기술 → 바리스타 챔피언십. 체류 3-4시간.</div>
        </foreignObject>
      

        <rect x="610" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#f43f5e" stroke-width="3"/>
        <circle cx="660" cy="280" r="30" fill="#f43f5e"/>
        <text x="660" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">NF</text>
        <text x="710" y="290" font-size="30" font-weight="900" fill="#1a1a1a">이상주의형</text>
        <foreignObject x="650" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">농부 초청 부스 → 싱글 오리진 스토리 → 라떼아트. 체류 4-5시간.</div>
        </foreignObject>
      

        <rect x="100" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
        <circle cx="150" cy="580" r="30" fill="#10b981"/>
        <text x="150" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">SJ</text>
        <text x="200" y="590" font-size="30" font-weight="900" fill="#1a1a1a">관리자형</text>
        <foreignObject x="140" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">유명 로스터리 → 장비 체험 → 창업 상담. 검증된 브랜드 위주 3-4시간.</div>
        </foreignObject>
      

        <rect x="610" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
        <circle cx="660" cy="580" r="30" fill="#f59e0b"/>
        <text x="660" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">SP</text>
        <text x="710" y="590" font-size="30" font-weight="900" fill="#1a1a1a">탐험가형</text>
        <foreignObject x="650" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">계획 X. 시식·체험 코너 즉흥 이동. 체류 2-3시간으로 짧고 강렬.</div>
        </foreignObject>
      
  
<text x="1180" y="892" text-anchor="end" font-size="14" font-weight="600" fill="#9ca3af" opacity="0.85">192types.co.kr</text>
</svg>
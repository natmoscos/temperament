  <text x="600" y="50" text-anchor="middle" font-size="42" font-weight="800" fill="#171717">카톡 대화 4대 모드 — 네 유형은?</text>
  <text x="600" y="80" text-anchor="middle" font-size="20" font-weight="500" fill="#6b7280">인지기능별 카톡 대응 스타일 · 즉답 / 생각 / 잠수 / 답정너</text>

  
      <g transform="translate(60, 115)">

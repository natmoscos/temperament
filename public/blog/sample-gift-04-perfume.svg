      <circle cx="-22" cy="8" r="22" fill="#fbcfe8" opacity="0.9"/>
      <circle cx="22" cy="8" r="22" fill="#fbcfe8" opacity="0.9"/>
      <circle cx="-13" cy="25" r="22" fill="#fbcfe8" opacity="0.85"/>
      <circle cx="13" cy="25" r="22" fill="#fbcfe8" opacity="0.85"/>
      <circle cx="0" cy="0" r="10" fill="#fef3c7"/>

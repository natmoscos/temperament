<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#faf8f5"/>

  <!-- 배경: 파스텔 그라데이션 + 빛 -->
  <defs>
    <radialGradient id="perfBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffe5ec"/>
      <stop offset="100%" stop-color="#e0bbe4"/>
    </radialGradient>
    <linearGradient id="perfumeBottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fce7f3" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#perfBg)"/>

  <!-- 장식 꽃잎 (흩뿌림) -->
  
    <g transform="translate(150, 180) rotate(-15) scale(0.8)" opacity="0.7">
      <circle cx="0" cy="-25" r="22" fill="#fbcfe8"/>
      <circle cx="-22" cy="8" r="22" fill="#fbcfe8" opacity="0.9"/>
      <circle cx="22" cy="8" r="22" fill="#fbcfe8" opacity="0.9"/>
      <circle cx="-13" cy="25" r="22" fill="#fbcfe8" opacity="0.85"/>
      <circle cx="13" cy="25" r="22" fill="#fbcfe8" opacity="0.85"/>
      <circle cx="0" cy="0" r="10" fill="#fef3c7"/>
    </g>
  
    <g transform="translate(1050, 150) rotate(20) scale(1)" opacity="0.7">
      <circle cx="0" cy="-25" r="22" fill="#ddd6fe"/>
      <circle cx="-22" cy="8" r="22" fill="#ddd6fe" opacity="0.9"/>
      <circle cx="22" cy="8" r="22" fill="#ddd6fe" opacity="0.9"/>
      <circle cx="-13" cy="25" r="22" fill="#ddd6fe" opacity="0.85"/>
      <circle cx="13" cy="25" r="22" fill="#ddd6fe" opacity="0.85"/>
      <circle cx="0" cy="0" r="10" fill="#fef3c7"/>
    </g>
  
    <g transform="translate(200, 720) rotate(10) scale(0.9)" opacity="0.7">
      <circle cx="0" cy="-25" r="22" fill="#fecaca"/>
      <circle cx="-22" cy="8" r="22" fill="#fecaca" opacity="0.9"/>
      <circle cx="22" cy="8" r="22" fill="#fecaca" opacity="0.9"/>
      <circle cx="-13" cy="25" r="22" fill="#fecaca" opacity="0.85"/>
      <circle cx="13" cy="25" r="22" fill="#fecaca" opacity="0.85"/>
      <circle cx="0" cy="0" r="10" fill="#fef3c7"/>
    </g>
  
    <g transform="translate(1000, 780) rotate(-20) scale(0.7)" opacity="0.7">
      <circle cx="0" cy="-25" r="22" fill="#fed7aa"/>
      <circle cx="-22" cy="8" r="22" fill="#fed7aa" opacity="0.9"/>
      <circle cx="22" cy="8" r="22" fill="#fed7aa" opacity="0.9"/>
      <circle cx="-13" cy="25" r="22" fill="#fed7aa" opacity="0.85"/>
      <circle cx="13" cy="25" r="22" fill="#fed7aa" opacity="0.85"/>
      <circle cx="0" cy="0" r="10" fill="#fef3c7"/>
    </g>
  
    <g transform="translate(950, 420) rotate(30) scale(0.6)" opacity="0.7">

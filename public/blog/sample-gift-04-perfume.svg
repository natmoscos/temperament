  <!-- 중앙 향수병 일러스트 -->
  <g transform="translate(600, 450)">
    <!-- 향기 선 (위로 올라가는 웨이브) -->
    <g opacity="0.4" stroke="#b76e79" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M -30 -230 Q -40 -260 -30 -290 Q -20 -320 -30 -350"/>
      <path d="M 0 -230 Q 10 -260 0 -290 Q -10 -320 0 -350"/>
      <path d="M 30 -230 Q 20 -260 30 -290 Q 40 -320 30 -350"/>
    </g>

    <!-- 뚜껑 -->
    <rect x="-35" y="-230" width="70" height="40" rx="6" fill="#2c3e50"/>
    <rect x="-40" y="-190" width="80" height="18" rx="4" fill="#b76e79"/>

    <!-- 목 -->
    <rect x="-20" y="-172" width="40" height="35" fill="url(#perfumeBottle)" stroke="#b76e79" stroke-width="2"/>

    <!-- 병 몸체 (둥근 사각) -->
    <path d="M -120 -137 L 120 -137 Q 140 -130 140 -100 L 140 140 Q 140 170 110 170 L -110 170 Q -140 170 -140 140 L -140 -100 Q -140 -130 -120 -137 Z" fill="url(#perfumeBottle)" stroke="#b76e79" stroke-width="3"/>

    <!-- 라벨 -->
    <rect x="-80" y="-40" width="160" height="130" rx="8" fill="#ffffff" stroke="#b76e79" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" font-size="14" font-weight="700" fill="#b76e79" letter-spacing="4">ISTJ</text>
    <line x1="-50" y1="8" x2="50" y2="8" stroke="#b76e79" stroke-width="1"/>
    <text x="0" y="35" text-anchor="middle" font-size="22" font-weight="900" fill="#2c3e50">시그니처</text>
    <text x="0" y="60" text-anchor="middle" font-size="18" font-weight="700" fill="#4b5563">SIGNATURE</text>
    <text x="0" y="85" text-anchor="middle" font-size="14" font-weight="600" fill="#b76e79">EAU DE PARFUM</text>

    <!-- 액체 반사광 -->
    <ellipse cx="-90" cy="-80" rx="15" ry="80" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- 상단 카테고리 배지 -->
  <g transform="translate(600, 130)">
    <rect x="-140" y="-28" width="280" height="56" rx="28" fill="#b76e79"/>
    <text x="0" y="10" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="3">🌸 FRAGRANCE PICK</text>
  </g>

  <!-- 하단 제품 정보 -->
  <g transform="translate(600, 770)">
    <text x="0" y="0" text-anchor="middle" font-size="38" font-weight="900" fill="#1a1a1a">조 말론 시그니처 향수</text>
    <text x="0" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#b76e79">본인이 절대 안 사는, 그래서 가장 기억에 남는</text>
  </g>
  
<text x="1180" y="892" text-anchor="end" font-size="14" font-weight="600" fill="#9ca3af" opacity="0.85">192types.co.kr · 선물 가이드</text>

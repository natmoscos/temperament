<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">기질별 부 축적 가이드</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">부자들의 공식을 네 유형에 맞게 적용하는 4단계</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0891b2">🔮 NT (분석가형) 부 축적</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INTJ · INTP · ENTJ · ENTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 네 강점 활용 — 10년 비전 + 시스템 구축</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 단기 트레이딩보다 장기 성장 자산</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 사업 또는 고연봉 전문직이 최적</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 조급함 경계 — 복리는 10년 후 터짐</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#f43f5e">✨ NF (이상주의형) 부 축적</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INFJ · INFP · ENFJ · ENFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 의미 있는 브랜드 · 콘텐츠 제작</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 감정 소비 방지 + 공동 계좌 설계</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 파트너 재정관리자 둘 것</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 가치 일치하는 투자만 (ESG · 임팩트)</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#059669">🏦 SJ (관리자형) 부 축적</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISTJ · ISFJ · ESTJ · ESFJ</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 버핏형 장기 꾸준 투자 최적</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 자산 배분 체계화 · 리밸런싱 고정</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 안정 자산 70% + 성장 자산 30%</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 공무원 · 전문직 + 부업 소득</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#d97706"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#d97706">🚀 SP (기회포착형) 부 축적</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISTP · ISFP · ESTP · ESFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 실전 감각 활용 — 부동산 · 세일즈</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 단기 트레이딩 재능 있으나 리스크 관리</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 비상금 6개월분 무조건 확보</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 충동 결정 24시간 쿨다운 룰</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 경제학 리포트</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">기질별 우정 유지 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">네 기질 최적화된 4단계 실전 가이드 · 오늘부터 1개씩</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#f43f5e">🌟 다혈질 우정 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 3~5명 핵심 친구에 에너지 집중 (분산 방지)</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 감정 의존 밸런스 점검 — 일방적 소비 주의</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 분기 1회 "친구 관계 정리 시간" 가지기</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ SNS 활동량 조절 — 관계 피로도 방지</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0891b2">⚡ 담즙질 우정 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① "이 친구한테 뭘 배울까" 태도 탈피</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 감정 대화 시 해결책 대신 공감 우선</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 약속 시간 존중 — 자기 스케줄 우선 주의</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 친구에게 "그냥 잘 지내?" 톡 주 1회</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#059669">🌾 점액질 우정 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 참지 말고 거슬리는 것 1개 표현</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 관계 피로할 때 "나도 휴식 필요" 선언</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 장기 친구 3명에 집중 (넓히지 않기)</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 연말 "고마웠어" 한 통씩 — 관계 유지 비타민</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0e7490">🌙 우울질 우정 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 소수 친구에 "나 이런 사람이야" 설명서 제공</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 깊은 대화 욕구 친구에겐 예고 후 만남</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 잠수 길어지면 "나 회복 중" 1줄 메시지</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 진심 표현 훈련 — "고맙다" "미안하다" 말로</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 친구 관계 리포트</text>
</svg>
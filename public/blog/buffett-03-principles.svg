<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="42" font-weight="800" fill="#171717">ISTJ 버핏의 투자 10원칙</text>
  <text x="600" y="80" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">Si(검증) + Te(실행) 조합의 교과서 · 70년간 변하지 않은 철칙</text>

  
      <g transform="translate(60, 120)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">01</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">내가 이해하는 사업만 산다</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Si 검증</text>
        </g>
      </g>
    
      <g transform="translate(630, 120)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">02</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">영원히 보유할 기업만 산다</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Si 지속</text>
        </g>

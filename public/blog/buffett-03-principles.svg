        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">07</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">첫 번째 원칙: 돈 잃지 않기</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Te 리스크</text>
        </g>
      </g>
    
      <g transform="translate(630, 555)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">08</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">시간이 훌륭한 기업의 친구</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Si 복리</text>
        </g>
      </g>
    
      <g transform="translate(60, 700)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">09</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">시장 예측 안 한다</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Te 현실</text>
        </g>
      </g>
    
      <g transform="translate(630, 700)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">10</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">내가 아는 사업으로 부자 된다</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Si 집중</text>
        </g>
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 경제학 리포트</text>

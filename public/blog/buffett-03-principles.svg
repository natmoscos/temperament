        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">06</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">남들이 탐욕스러울 때 두려워한다</text>


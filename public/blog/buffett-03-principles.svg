        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">정직한 경영진이 필수</text>

        <g transform="translate(90, 75)">
          <rect width="80" height="26" rx="13" fill="#1e3a8a" opacity="0.15"/>
          <text x="40" y="18" text-anchor="middle" font-size="18" font-weight="900" fill="#1e3a8a">Si 신뢰</text>
        </g>
      </g>
    
      <g transform="translate(60, 410)">
        <rect width="540" height="130" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="130" rx="4" fill="#1e3a8a"/>

        <text x="30" y="50" font-size="36" font-weight="900" fill="#eab308">05</text>
        <text x="90" y="50" font-size="22" font-weight="800" fill="#171717">내재 가치보다 싸게 산다</text>


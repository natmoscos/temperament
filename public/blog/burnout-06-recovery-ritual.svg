<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">기질별 번아웃 회복 루틴 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">네 기질에 맞는 4단계 회복 프로토콜 · 오늘부터 1개씩 실천</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#f43f5e">🔥 다혈질 회복 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ · (회복 24~58일)</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 감정 쏟아낼 대상 확보 (민지 같은 친구 1명)</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 새로운 장소 방문 (2주에 한 번은 새 카페/동네)</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ SNS 30일 해독 — 다른 사람 감정 차단</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 짧은 기쁨 의식 — 하루 30분 좋아하는 일</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0891b2">🎯 담즙질 회복 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP · (회복 7~20일)</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① "아무것도 안 하는 24시간" 확보 (제일 어려움)</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 수면 8시간 강제 — 알람 앱 사용</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 성과 지표 잠시 OFF — 목표 없는 취미 도입</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 측근 1명과 약한 소리 공유</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#059669">🌿 점액질 회복 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP · (회복 12~42일)</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 루틴 먼저 복구 (식사·수면부터)</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② "안 해도 되는 일" 리스트 작성 → 삭제</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 돌봄 방향 역전 — 누군가 나를 돌보게 허락</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 조용한 재충전 공간 확보 (방·카페·산책로)</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0e7490">🌙 우울질 회복 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP · (회복 3~52일)</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 부정 시나리오 반복 인식 → 종이에 적기</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 몸을 움직이는 활동 (산책 20분)</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 감각 복구 — 음식 맛·음악·빛 의식적 인식</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 신뢰하는 1명과 5분 대화 (혼자 오래 있지 않기)</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 번아웃 리포트</text>
</svg>
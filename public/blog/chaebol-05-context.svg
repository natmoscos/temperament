<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="42" font-weight="800" fill="#171717">한국 재벌의 특수 환경 변수</text>
  <text x="600" y="80" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">글로벌 부자와 다른 6가지 변수 · 같은 NT여도 행동 달라지는 이유</text>

  
      <g transform="translate(60, 120)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#c0392b"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#c0392b">가족 승계 압력</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#dc2626"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">HIGH</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">개인 비전보다 그룹 안정 우선</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ Ni 비전 제약 · Te 실행 보수적</text>
      </g>
    
      <g transform="translate(60, 240)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#f59e0b"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#f59e0b">집단 조직 문화</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#dc2626"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">HIGH</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">개인 결정보다 임원진 합의</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ 카리스마형 Te 제한 · Ti 분석 선호</text>
      </g>
    
      <g transform="translate(60, 360)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#0891b2"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#0891b2">사법 리스크</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#f59e0b"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">MID</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">수시 법무 검토 · 공개 행보 신중</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ 머스크식 공개 소통 불가능</text>
      </g>
    
      <g transform="translate(60, 480)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#059669"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#059669">대기업 의존 생태계</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#f59e0b"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">MID</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">협력사 · 관계 유지 중요</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ Fe 보조 사용 증가 · 관계 정치</text>
      </g>
    
      <g transform="translate(60, 600)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#e11d48"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#e11d48">노동 문화 · 노조</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#f59e0b"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">MID</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">공격적 구조조정 어려움</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ 머스크식 해고 불가능 · 장기 전환</text>
      </g>
    
      <g transform="translate(60, 720)">
        <rect width="1080" height="105" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="105" rx="4" fill="#8b5cf6"/>

        <text x="40" y="35" font-size="25" font-weight="900" fill="#8b5cf6">세대 전환</text>
        <g transform="translate(40, 48)">
          <rect width="65" height="24" rx="12" fill="#16a34a"/>
          <text x="32" y="17" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">LOW</text>
        </g>

        <text x="130" y="65" font-size="20" font-weight="700" fill="#374151">2~4세대의 글로벌 교육 배경</text>
        <text x="130" y="88" font-size="17" font-weight="500" fill="#6b7280">→ 현 세대는 이전 세대보다 NT 뚜렷</text>
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 경제학 리포트</text>
</svg>
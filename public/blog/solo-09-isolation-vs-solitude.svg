<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="58" text-anchor="middle" font-size="32" font-weight="800" fill="#171717">혼자 = 외로움? 천만에</text>
  <text x="600" y="90" text-anchor="middle" font-size="15" font-weight="500" fill="#6b7280">'고립'과 '독립'은 같은 혼자라도 정반대의 상태</text>
  
    <g>
      <rect x="80" y="135" width="500" height="620" rx="20" fill="#fff1f2" stroke="#e11d48" stroke-width="2.5"/>
      <rect x="80" y="135" width="500" height="100" rx="20" fill="#e11d48"/>
      <rect x="80" y="215" width="500" height="20" fill="#e11d48"/>
      <text x="330" y="180" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">고립 (Isolation)</text>
      <text x="330" y="210" text-anchor="middle" font-size="14" font-weight="500" fill="#fff" opacity="0.9">원치 않는 단절</text>
      
        <g transform="translate(110, 275)">
          <circle cx="18" cy="20" r="18" fill="#e11d48"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✕</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">수동적 · 무기력</text>
        </g>
      
        <g transform="translate(110, 335)">
          <circle cx="18" cy="20" r="18" fill="#e11d48"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✕</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">연결 단절감 · 외로움</text>
        </g>
      
        <g transform="translate(110, 395)">
          <circle cx="18" cy="20" r="18" fill="#e11d48"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✕</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">회피 · 두려움이 동기</text>
        </g>
      
        <g transform="translate(110, 455)">
          <circle cx="18" cy="20" r="18" fill="#e11d48"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✕</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">시간이 지나도 에너지 ↓</text>
        </g>
      
        <g transform="translate(110, 515)">
          <circle cx="18" cy="20" r="18" fill="#e11d48"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✕</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">우울·불안 위험 증가</text>
        </g>
      
      <rect x="105" y="675" width="450" height="58" rx="10" fill="#e11d48" fill-opacity="0.12" stroke="#e11d48" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="330" y="710" text-anchor="middle" font-size="13" font-weight="700" fill="#be123c">스스로 선택한 것이 아니면 = 위험 신호</text>
    </g>
    <g>
      <rect x="620" y="135" width="500" height="620" rx="20" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
      <rect x="620" y="135" width="500" height="100" rx="20" fill="#0891b2"/>
      <rect x="620" y="215" width="500" height="20" fill="#0891b2"/>
      <text x="870" y="180" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">독립 (Solitude)</text>
      <text x="870" y="210" text-anchor="middle" font-size="14" font-weight="500" fill="#fff" opacity="0.9">선택한 혼자 시간</text>
      
        <g transform="translate(650, 275)">
          <circle cx="18" cy="20" r="18" fill="#0891b2"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✓</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">능동적 · 창의적</text>
        </g>
      
        <g transform="translate(650, 335)">
          <circle cx="18" cy="20" r="18" fill="#0891b2"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✓</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">내면과의 연결감 · 충만</text>
        </g>
      
        <g transform="translate(650, 395)">
          <circle cx="18" cy="20" r="18" fill="#0891b2"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✓</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">성장 · 호기심이 동기</text>
        </g>
      
        <g transform="translate(650, 455)">
          <circle cx="18" cy="20" r="18" fill="#0891b2"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✓</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">시간이 지날수록 에너지 ↑</text>
        </g>
      
        <g transform="translate(650, 515)">
          <circle cx="18" cy="20" r="18" fill="#0891b2"/>
          <text x="18" y="27" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">✓</text>
          <text x="52" y="27" font-size="15" font-weight="600" fill="#171717">자기이해·회복 촉진</text>
        </g>
      
      <rect x="645" y="675" width="450" height="58" rx="10" fill="#0891b2" fill-opacity="0.12" stroke="#0891b2" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="870" y="710" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">스스로 선택한 것이면 = 고도의 기술</text>
    </g>
  <!-- VS divider -->
  <circle cx="600" cy="445" r="36" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="600" y="454" text-anchor="middle" font-size="20" font-weight="800" fill="#374151">VS</text>
  
<text x="1180" y="890" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.8">192types.co.kr · 2026 MBTI 트렌드 시리즈</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg-p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef7ed"/>
      <stop offset="60%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fed7d7"/>
    </linearGradient>
    <radialGradient id="glow-p" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ff5e7e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff5e7e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="900" fill="url(#bg-p)"/>
  <rect width="1200" height="900" fill="url(#glow-p)"/>

  <!-- D-Day 뱃지 -->
  <rect x="70" y="80" rx="10" width="320" height="56" fill="#c1184c"/>
  <text x="230" y="118" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="1">🌹 5월 8일 D-8 가이드</text>

  <!-- 메인 카피 1: 시즌 -->
  <text x="70" y="210" font-size="76" font-weight="900" fill="#0a0a0a" letter-spacing="-3">어버이날 2026</text>

  <!-- 충격 통계 강조 -->
  <rect x="70" y="270" width="14" height="84" fill="#c1184c"/>
  <text x="100" y="320" font-size="38" font-weight="800" fill="#c1184c">한국 부모님 만족도</text>
  <text x="100" y="385" font-size="92" font-weight="900" fill="#0a0a0a" letter-spacing="-3">6.2 <tspan font-size="48" fill="#c1184c">/ 10</tspan></text>

  <!-- 부연 -->
  <text x="70" y="445" font-size="34" font-weight="700" fill="#0a0a0a" opacity="0.85">왜 매년 빗나갈까? — 본인 결로 추정해서</text>

  <!-- 4분류 박스 -->
  <g transform="translate(70, 510)">
    <!-- SJ (오렌지) -->
    <rect x="0" y="0" rx="14" width="250" height="130" fill="#fbbf24" opacity="0.25"/>
    <rect x="0" y="0" rx="14" width="250" height="130" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <text x="125" y="42" text-anchor="middle" font-size="22" font-weight="900" fill="#3f6212">SJ 관리자형</text>
    <text x="125" y="80" text-anchor="middle" font-size="44" font-weight="900" fill="#0a0a0a">45%</text>
    <text x="125" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#0a0a0a" opacity="0.7">한국 60대 절반</text>

    <!-- SP (코럴) -->
    <rect x="270" y="0" rx="14" width="250" height="130" fill="#ff5e7e" opacity="0.25"/>
    <rect x="270" y="0" rx="14" width="250" height="130" fill="none" stroke="#ff5e7e" stroke-width="3"/>
    <text x="395" y="42" text-anchor="middle" font-size="22" font-weight="900" fill="#c1184c">SP 탐험가형</text>
    <text x="395" y="80" text-anchor="middle" font-size="44" font-weight="900" fill="#0a0a0a">28%</text>
    <text x="395" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#0a0a0a" opacity="0.7">경험 중심</text>

    <!-- NF (핑크) -->
    <rect x="540" y="0" rx="14" width="250" height="130" fill="#ec4899" opacity="0.25"/>
    <rect x="540" y="0" rx="14" width="250" height="130" fill="none" stroke="#ec4899" stroke-width="3"/>
    <text x="665" y="42" text-anchor="middle" font-size="22" font-weight="900" fill="#ec4899">NF 외교관형</text>
    <text x="665" y="80" text-anchor="middle" font-size="44" font-weight="900" fill="#0a0a0a">15%</text>
    <text x="665" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#0a0a0a" opacity="0.7">감정·서사</text>

    <!-- NT (그린) -->
    <rect x="810" y="0" rx="14" width="250" height="130" fill="#84cc16" opacity="0.25"/>
    <rect x="810" y="0" rx="14" width="250" height="130" fill="none" stroke="#84cc16" stroke-width="3"/>
    <text x="935" y="42" text-anchor="middle" font-size="22" font-weight="900" fill="#3f6212">NT 분석가형</text>
    <text x="935" y="80" text-anchor="middle" font-size="44" font-weight="900" fill="#0a0a0a">12%</text>
    <text x="935" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#0a0a0a" opacity="0.7">효율·실용</text>
  </g>

  <!-- 하단 태그라인 -->
  <rect x="70" y="700" width="14" height="60" fill="#c1184c"/>
  <text x="100" y="730" font-size="28" font-weight="900" fill="#0a0a0a">MBTI별 부모님 코드 정답</text>
  <text x="100" y="762" font-size="20" font-weight="700" fill="#0a0a0a" opacity="0.8">대화법 + 선물 + 상호작용 매트릭스 · 5/8까지 8일 남았어</text>

  <!-- 하단 보조 정보 -->
  <text x="70" y="820" font-size="16" font-weight="700" fill="#c1184c">📚 한국갤럽 2024 · Norton·Quenk 학술 인용</text>

  <!-- 우하단 브랜드 -->
  <text x="1130" y="862" text-anchor="end" font-size="16" font-weight="800" fill="#c1184c">192types.co.kr</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">급성 × 만성 스트레스 반응 4분면</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">가로: 표현 방식(외부 폭발 ↔ 내부 침잠) · 세로: 반응 강도(급성 폭발 ↔ 만성 누적)</text>

  <!-- Frame -->
  <rect x="160" y="160" width="900" height="600" rx="20" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- Cross lines -->
  <line x1="610" y1="160" x2="610" y2="760" stroke="#d1d5db" stroke-dasharray="4 6"/>
  <line x1="160" y1="460" x2="1060" y2="460" stroke="#d1d5db" stroke-dasharray="4 6"/>

  <!-- Axis labels -->
  <text x="610" y="146" text-anchor="middle" font-size="17" font-weight="700" fill="#6b7280">↑ 급성 폭발</text>
  <text x="610" y="782" text-anchor="middle" font-size="17" font-weight="700" fill="#6b7280">↓ 만성 누적</text>
  <text x="150" y="465" text-anchor="end" font-size="17" font-weight="700" fill="#6b7280">← 내부 침잠</text>
  <text x="1070" y="465" font-size="17" font-weight="700" fill="#6b7280">외부 폭발 →</text>

  <!-- Quadrant labels -->
  <text x="200" y="200" font-size="18" font-weight="800" fill="#374151">급성 + 내부</text>
  <text x="200" y="218" font-size="15" font-weight="500" fill="#6b7280">감정 폭발 · 울음 / 패닉</text>

  <text x="1020" y="200" text-anchor="end" font-size="18" font-weight="800" fill="#374151">급성 + 외부</text>
  <text x="1020" y="218" text-anchor="end" font-size="15" font-weight="500" fill="#6b7280">공격적 분출 · 대립</text>

  <text x="200" y="712" font-size="18" font-weight="800" fill="#374151">만성 + 내부</text>
  <text x="200" y="730" font-size="15" font-weight="500" fill="#6b7280">은둔 · 누적 우울</text>

  <text x="1020" y="712" text-anchor="end" font-size="18" font-weight="800" fill="#374151">만성 + 외부</text>
  <text x="1020" y="730" text-anchor="end" font-size="15" font-weight="500" fill="#6b7280">과열 번아웃 · 성취 집착</text>

  

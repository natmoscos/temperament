<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">기질별 결혼 유지 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">20년 가는 결혼의 공식 · 기질별 4단계 실전 루틴</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#f43f5e">🌟 다혈질 결혼 유지 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 주 1회 "감정 상태 공유" 30분 대화</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 권태 신호 감지 → 분기 1회 여행·이벤트</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 과도한 감정 의존 방지 — 자기 친구 유지</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 상대 T형이면 감정 언어화 교육 대신 행동 인정</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0891b2">⚡ 담즙질 결혼 유지 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 일 끝나면 "가정 모드" 전환 의식 만들기</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 감정 대화를 "회의 30분"처럼 주간 예약</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 통제 욕구 내려놓기 — 상대 영역 존중</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 성과 정체기에도 결혼 유지 가치 되새기기</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#059669">🌾 점액질 결혼 유지 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 참지 말고 "작은 불만" 월 1회 정리 표현</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 자기 필요 "나는 이게 필요해" 말로 요청</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 관계 변화 수용 — 20년차에도 재학습 필요</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 도어슬램 예방 — 한계 오기 전 대화 시작</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0e7490">🌙 우울질 결혼 유지 루틴</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 감정 표현 훈련 — "사랑해" "고맙다" 말로</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 이상-현실 갭 크면 기대치 재조정 대화</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 독립 욕구 인정하되 "같이 있는 시간" 확보</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 장기 비전 공유 — 결혼 10년 후 로드맵</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 결혼 만족도 리포트</text>
</svg>
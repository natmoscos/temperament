<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">4가지 이별 반응 유형 — 너는 어떤 방식으로 앓아?</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">Fi 폭발 · Ti/Te 분석 · Si/Ni 침잠 · Se 전환 · 네 주기능이 결정해</text>

  
      <g transform="translate(60,115)">

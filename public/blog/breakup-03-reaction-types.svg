            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">일상 루틴으로 몸부터 복구</text>
          </g>
        
          <g transform="translate(28, 267)">
            <circle cx="7" cy="0" r="6" fill="#059669" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#059669">4</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">길지만 재발 확률 낮음</text>
          </g>
        
      </g>
    
      <g transform="translate(620,490)">

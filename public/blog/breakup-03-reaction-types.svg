        <text x="28" y="68" font-size="12" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFJ · INTJ</text>
        <text x="28" y="92" font-size="13" font-weight="700" fill="#374151">· 조용히 방에서 삭히기</text>
        
          <g transform="translate(28, 135)">

        <text x="28" y="68" font-size="12" font-weight="600" fill="#6b7280">ESTP · ENTP · ESFP · ENFP</text>
        <text x="28" y="92" font-size="13" font-weight="700" fill="#374151">· 다음 경험으로 덮어쓰기</text>
        
          <g transform="translate(28, 135)">
            <circle cx="7" cy="0" r="6" fill="#f59e0b" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#f59e0b">1</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">1주 내 새로운 만남/소개팅</text>
          </g>
        
          <g transform="translate(28, 179)">
            <circle cx="7" cy="0" r="6" fill="#f59e0b" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#f59e0b">2</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">새 헤어스타일·피트니스 시작</text>
          </g>
        
          <g transform="translate(28, 223)">
            <circle cx="7" cy="0" r="6" fill="#f59e0b" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#f59e0b">3</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">감정은 빠르게 처리</text>
          </g>
        
          <g transform="translate(28, 267)">
            <circle cx="7" cy="0" r="6" fill="#f59e0b" opacity="0.25"/>

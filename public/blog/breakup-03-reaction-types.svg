        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="44" font-size="22" font-weight="800" fill="#f43f5e">😢 울음형 (Fi 폭발)</text>
        <text x="28" y="68" font-size="12" font-weight="600" fill="#6b7280">INFP · ISFP · ENFP · ESFP</text>
        <text x="28" y="92" font-size="13" font-weight="700" fill="#374151">· 감정 먼저 쏟아내고 시작</text>
        
          <g transform="translate(28, 135)">
            <circle cx="7" cy="0" r="6" fill="#f43f5e" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#f43f5e">1</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">이별 당일 10시간 연속 울음</text>
          </g>
        
          <g transform="translate(28, 179)">
            <circle cx="7" cy="0" r="6" fill="#f43f5e" opacity="0.25"/>
            <text x="7" y="3" text-anchor="middle" font-size="9" font-weight="800" fill="#f43f5e">2</text>
            <text x="22" y="4" font-size="13" font-weight="600" fill="#374151">감성 플레이리스트 무한 반복</text>
          </g>
        
          <g transform="translate(28, 223)">
            <circle cx="7" cy="0" r="6" fill="#f43f5e" opacity="0.25"/>

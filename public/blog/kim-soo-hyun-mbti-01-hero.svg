<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg-k" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1437"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow-k" cx="85%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#ff2d8a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2d8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="900" fill="url(#bg-k)"/>
  <rect width="1200" height="900" fill="url(#glow-k)"/>

  <!-- 좌상단 뱃지 -->
  <rect x="70" y="80" rx="8" width="280" height="52" fill="#f5ff3d"/>
  <text x="210" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#0a0a0a" letter-spacing="1">🎭 배우 MBTI 분석</text>

  <!-- 메인 카피 1: 질문 -->
  <text x="70" y="280" font-size="110" font-weight="900" fill="#ffffff" letter-spacing="-3">김수현</text>
  <text x="440" y="280" font-size="110" font-weight="900" fill="#f5ff3d" letter-spacing="-3">MBTI?</text>

  <!-- 메인 카피 2: 반전 라벨 -->
  <rect x="70" y="330" width="420" height="4" fill="#ff2d8a"/>
  <text x="70" y="400" font-size="44" font-weight="800" fill="#ff2d8a" letter-spacing="-1">공식 비공개</text>
  <text x="70" y="450" font-size="30" font-weight="700" fill="#ffffff" opacity="0.85">→ 팬 커뮤니티 다수 추정</text>

  <!-- 메인 카피 3: 진짜 답 (초대형) -->
  <text x="70" y="720" font-size="250" font-weight="900" fill="#f5ff3d" letter-spacing="-8">ISFJ</text>

  <!-- 우측 포인트 라벨 -->
  <g transform="translate(780, 430)">
    <rect x="0" y="0" rx="14" width="360" height="180" fill="#ffffff" opacity="0.08"/>
    <rect x="0" y="0" rx="14" width="360" height="180" fill="none" stroke="#ff2d8a" stroke-width="3"/>
    <text x="180" y="60" text-anchor="middle" font-size="26" font-weight="900" fill="#ff2d8a" letter-spacing="1">왜 ISFJ?</text>
    <text x="180" y="105" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">백현우·도민준·백승찬</text>
    <text x="180" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">세 캐릭터의 공통 Si</text>
  </g>

  <!-- 하단 태그라인 -->
  <rect x="70" y="775" width="14" height="52" fill="#f5ff3d"/>
  <text x="100" y="800" font-size="22" font-weight="800" fill="#ffffff">눈물의 여왕 백현우로 읽는 수호자 기질</text>
  <text x="100" y="830" font-size="18" font-weight="600" fill="#ffffff" opacity="0.7">15년 롱런의 비밀 · 김지원과의 케미 분석</text>

  <!-- 우하단 브랜드 -->
  <text x="1130" y="862" text-anchor="end" font-size="16" font-weight="800" fill="#f5ff3d" opacity="0.9">192types.co.kr</text>
</svg>
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">스트레스 반응 4가지 모드 — 너는 어느 쪽이야?</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">주기능이 과부하되면 4가지 반응 중 하나로 튀어나와 · 반응 모드 = 대처 전략의 출발점</text>

  
      <g transform="translate(60,115)">

        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ESTP · ENTP · INTJ</text>
        <text x="28" y="90" font-size="17" font-weight="700" fill="#374151">· Te/Se 과잉 → 외부로 폭발</text>
        
          <g transform="translate(28, 130)">

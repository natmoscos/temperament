<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fef3c7"/>
    <stop offset="100%" stop-color="#fffbeb"/>
  </linearGradient>
  <linearGradient id="pinkStripe" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#ec4899" stop-opacity="0.55"/>
  </linearGradient>
</defs>
<rect width="1200" height="900" fill="url(#bg)"/>

<!-- Decorative emoji/symbols -->
<text x="150" y="200" font-size="70" opacity="0.18">♀</text>
<text x="1000" y="200" font-size="70" opacity="0.18">✨</text>
<text x="180" y="780" font-size="70" opacity="0.18">💫</text>
<text x="980" y="760" font-size="70" opacity="0.18">💖</text>

<!-- Pink top stripe for "Women" series branding -->
<rect x="0" y="130" width="1200" height="6" fill="url(#pinkStripe)"/>

<!-- Main card -->
<rect x="100" y="210" width="1000" height="480" rx="36" fill="#ffffff" stroke="#f59e0b" stroke-width="5" opacity="0.97"/>

<!-- Series label -->
<text x="600" y="285" text-anchor="middle" font-size="28" font-weight="700" fill="#ec4899" letter-spacing="8">♀ WOMEN GUIDE · 2026</text>

<!-- Huge type badge -->
<g transform="translate(600, 390)">
  <rect x="-170" y="-62" width="340" height="124" rx="28" fill="#f59e0b"/>
  <text x="0" y="20" text-anchor="middle" font-size="92" font-weight="900" fill="#fff" letter-spacing="4">ESFP</text>
</g>

<!-- Catch phrase -->
<text x="600" y="520" text-anchor="middle" font-size="60" font-weight="900" fill="#171717">분위기 메이커</text>

<!-- Description -->
<line x1="380" y1="550" x2="820" y2="550" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
<text x="600" y="600" text-anchor="middle" font-size="30" font-weight="700" fill="#f59e0b">발랄함 뒤 숨은 눈물</text>

<!-- Sub tagline -->
<text x="600" y="660" text-anchor="middle" font-size="22" font-weight="600" fill="#6b7280">인지기능 × 4기질 완전 해부 가이드</text>

<!-- Footer -->
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 여자 특징 완전정리</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">기질별 스트레스 해소 루틴 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">네 기질에 맞는 4단계 즉시 적용 전략 · 지금 바로 1개 실천</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#f43f5e">🌺 다혈질 스트레스 해소</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 신뢰하는 1명에게 3분 통화 — 감정 언어화</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 몸을 움직이는 짧은 활동 (산책 · 댄스)</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ "나도 위로 받을 권리" 선언하기</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 충동적 회피(쇼핑/폭식) 24시간 지연</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0891b2">⚙️ 담즙질 스트레스 해소</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① "지금 이거 미룰 수 있을까?" 질문 루틴</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 타인에게 책임 1개 위임 연습</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 5분 심호흡 · 몸 스캐닝</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 분노·공격 말투 24시간 쿨다운</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#059669">🍃 점액질 스트레스 해소</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 일상 루틴 보호 (식사·수면 지키기)</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② "참기 한도 그래프" 매일 체크</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 작은 거절 연습 → 부담 덜기</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 안전 공간(방·카페) 1시간 확보</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0e7490">🌙 우울질 스트레스 해소</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 사고 루프 인식 → 종이에 적기</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 몸 감각 복구 (따뜻한 차 · 음악 · 산책)</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 의미 찾기 금지 — "그냥 힘들다" 수용</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 신뢰 1명과 5분 비언어적 함께 있기</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 스트레스 리포트</text>
</svg>
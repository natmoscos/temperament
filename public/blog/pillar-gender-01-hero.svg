    <text x="70" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#be185d">♀ 여자 16유형</text>
    <rect x="165" y="0" width="140" height="38" rx="19" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="235" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">♂ 남자 16유형</text>
  </g>

  <!-- Center card -->
  <rect x="270" y="230" width="660" height="270" rx="24" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="285" text-anchor="middle" font-size="17" font-weight="600" fill="#6b7280" letter-spacing="8">PILLAR GUIDE · 2026</text>
  <text x="600" y="352" text-anchor="middle" font-size="46" font-weight="800" fill="#171717">MBTI 여자 · 남자 특징</text>
  <text x="600" y="395" text-anchor="middle" font-size="30" font-weight="700" fill="#374151">완전 정리</text>
  <line x1="460" y1="420" x2="740" y2="420" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="445" text-anchor="middle" font-size="16" font-weight="500" fill="#6b7280">16유형 × 성별 = 32가지 조합 · 인지기능 기반 해석</text>
  <text x="600" y="473" text-anchor="middle" font-size="13" font-weight="500" fill="#9ca3af">매력 포인트 · 연애 스타일 · 오해받는 이유</text>

  <!-- Bottom 4-temperament chip row -->
  <g transform="translate(300, 560)">
    
      <g transform="translate(0,0)">
        <circle cx="12" cy="24" r="9" fill="#0891b2"/>
        <text x="28" y="29" font-size="13" font-weight="600" fill="#374151">NT 분석가형</text>

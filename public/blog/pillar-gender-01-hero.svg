  <text x="600" y="705" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">한 번에 읽는 16유형 × 여자 · 남자 가이드</text>
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · MBTI 성별 특징 가이드</text>

      <circle cx="200" cy="480" r="60" fill="#0891b2" opacity="0.1"/>
      <circle cx="200" cy="480" r="50" fill="#0891b2"/>
      <text x="200" y="485" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">ENTJ</text>
    
      <circle cx="1080" cy="500" r="60" fill="#e11d48" opacity="0.1"/>
      <circle cx="1080" cy="500" r="50" fill="#e11d48"/>

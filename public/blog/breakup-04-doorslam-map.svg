<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">도어슬램 위험도 — 한 번 차단하면 영원한 유형 TOP 16</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">"연락 차단 + 기억 삭제 + 재접촉 거부" 강도 100점 만점</text>

  
      <text x="45" y="138" font-size="20" font-weight="700" fill="#6b7280">01</text>

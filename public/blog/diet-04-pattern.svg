<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="30" font-weight="800" fill="#171717">4가지 다이어트 DNA — 네 유형 접근법</text>
  <text x="600" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#6b7280">기질별 다이어트 최적화 전략 · 스프린트 / 루틴 / 게임 / 의미</text>

  
      <g transform="translate(60, 115)">

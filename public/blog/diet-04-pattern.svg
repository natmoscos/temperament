        <rect width="8" height="360" rx="4" fill="#0891b2"/>
        <text x="30" y="45" font-size="24" font-weight="900" fill="#0891b2">⚡ 스프린트 다이어트</text>
        <text x="30" y="72" font-size="13" font-weight="700" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>

        <rect x="30" y="88" width="460" height="40" rx="12" fill="#0891b2" opacity="0.1"/>
        <text x="45" y="113" font-size="13" font-weight="700" fill="#0891b2">고강도 + 단기 목표 + 수치 경쟁</text>

        
          <g transform="translate(30, 160)">
            <circle cx="10" cy="0" r="11" fill="#0891b2" opacity="0.2"/>
            <text x="10" y="5" text-anchor="middle" font-size="12" font-weight="900" fill="#0891b2">1</text>
            <text x="32" y="5" font-size="13" font-weight="600" fill="#374151">월 목표: -3kg 같은 명확 수치</text>

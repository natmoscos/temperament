            <text x="32" y="5" font-size="13" font-weight="600" fill="#374151">지루하면 종목 전환 OK</text>
          </g>
        
          <g transform="translate(30, 295)">
            <circle cx="10" cy="0" r="11" fill="#d97706" opacity="0.2"/>

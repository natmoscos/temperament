          <g transform="translate(30, 295)">
            <circle cx="10" cy="0" r="11" fill="#f43f5e" opacity="0.2"/>
            <text x="10" y="5" text-anchor="middle" font-size="12" font-weight="900" fill="#f43f5e">4</text>
            <text x="32" y="5" font-size="13" font-weight="600" fill="#374151">느린 변화 수용 + 자기 용서</text>

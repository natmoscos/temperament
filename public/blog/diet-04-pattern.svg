        <rect x="30" y="88" width="460" height="40" rx="12" fill="#f43f5e" opacity="0.1"/>
        <text x="45" y="113" font-size="13" font-weight="700" fill="#f43f5e">가치 + 감정 + 몸 돌봄</text>

        
          <g transform="translate(30, 160)">

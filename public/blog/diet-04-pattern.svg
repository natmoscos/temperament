            <text x="10" y="5" text-anchor="middle" font-size="12" font-weight="900" fill="#f43f5e">1</text>
            <text x="32" y="5" font-size="13" font-weight="600" fill="#374151">"건강한 나" 이상 이미지 설정</text>
          </g>
        
          <g transform="translate(30, 205)">
            <circle cx="10" cy="0" r="11" fill="#f43f5e" opacity="0.2"/>

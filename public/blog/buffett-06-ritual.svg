<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#171717">기질별 "버핏 방식" 적용 가이드</text>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">ISTJ가 아니어도 적용 가능한 4단계 루틴</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#0e7490">🔬 NT 유형의 버핏 배우기</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INTJ · INTP · ENTJ · ENTP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 네 비전 + 버핏의 검증 = 최강 조합</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 단기 예측 재능 남용 주의</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 분석 → 실행까지 기한 정하기</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ "이해하는 것"만 투자 룰 도입</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#e11d48"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#e11d48">✨ NF 유형의 버핏 배우기</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">INFJ · INFP · ENFJ · ENFP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 가치 공감 기업에 장기 투자</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 감정 트레이딩 금지 룰</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 매매 전 24시간 쿨다운</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 자동 매수 시스템으로 감정 배제</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#047857"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#047857">🏦 SJ 유형의 버핏 배우기</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ISTJ · ISFJ · ESTJ · ESFJ</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① DNA 호환 — 그대로 적용 가능</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 배당주 + 인덱스 꾸준 매입</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 연 1회 리밸런싱 루틴</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 분산 투자로 안정성 강화</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#d97706"/>
        <text x="28" y="42" font-size="20" font-weight="800" fill="#d97706">🚀 SP 유형의 버핏 배우기</text>
        <text x="28" y="66" font-size="12" font-weight="600" fill="#6b7280">ISTP · ISFP · ESTP · ESFP</text>
        
          <text x="28" y="115" font-size="13" font-weight="600" fill="#374151">① 단기 본능 억제 훈련 필수</text>
        
          <text x="28" y="167" font-size="13" font-weight="600" fill="#374151">② 자동이체 · 자동매수 시스템</text>
        
          <text x="28" y="219" font-size="13" font-weight="600" fill="#374151">③ 실전 감각은 소액 트레이딩에만</text>
        
          <text x="28" y="271" font-size="13" font-weight="600" fill="#374151">④ 장기 포지션은 건드리지 않기</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 경제학 리포트</text>
</svg>
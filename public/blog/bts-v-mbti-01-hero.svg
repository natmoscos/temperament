<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg-v" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#2d0a4e"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow-v" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="900" fill="url(#bg-v)"/>
  <rect width="1200" height="900" fill="url(#glow-v)"/>

  <!-- 뱃지 -->
  <rect x="70" y="80" rx="8" width="310" height="52" fill="#f5ff3d"/>
  <text x="225" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#0a0a0a" letter-spacing="1">🎤 4번 바뀐 MBTI</text>

  <!-- 이름 -->
  <text x="70" y="230" font-size="86" font-weight="900" fill="#ffffff" letter-spacing="-3">BTS V 김태형</text>

  <!-- Box1: 2019 ENFP (오렌지 = 외향 시작) -->
  <rect x="70" y="300" rx="14" width="240" height="140" fill="#ff6b1a" opacity="0.15"/>
  <rect x="70" y="300" rx="14" width="240" height="140" fill="none" stroke="#ff6b1a" stroke-width="3"/>
  <text x="190" y="345" text-anchor="middle" font-size="22" font-weight="900" fill="#ff6b1a" letter-spacing="1">2019</text>
  <text x="190" y="410" text-anchor="middle" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-2">ENFP</text>

  <!-- Arrow1 -->
  <text x="330" y="385" text-anchor="middle" font-size="40" font-weight="900" fill="#f5ff3d">→</text>

  <!-- Box2: 2021 INFP (핑크 = 감정 깊어짐) -->
  <rect x="350" y="300" rx="14" width="240" height="140" fill="#ff2d8a" opacity="0.18"/>
  <rect x="350" y="300" rx="14" width="240" height="140" fill="none" stroke="#ff2d8a" stroke-width="3"/>
  <text x="470" y="345" text-anchor="middle" font-size="22" font-weight="900" fill="#ff2d8a" letter-spacing="1">2021</text>
  <text x="470" y="410" text-anchor="middle" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-2">INFP</text>

  <!-- Arrow2 -->
  <text x="610" y="385" text-anchor="middle" font-size="40" font-weight="900" fill="#f5ff3d">→</text>

  <!-- Box3: 2025 ENTP (시안 = 논리 전환, 군대 후) -->
  <rect x="630" y="300" rx="14" width="240" height="140" fill="#00e5ff" opacity="0.18"/>
  <rect x="630" y="300" rx="14" width="240" height="140" fill="none" stroke="#00e5ff" stroke-width="3"/>
  <text x="750" y="345" text-anchor="middle" font-size="22" font-weight="900" fill="#00e5ff" letter-spacing="1">2025</text>
  <text x="750" y="410" text-anchor="middle" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-2">ENTP</text>

  <!-- Arrow3 (점선 — 미래 불확실) -->
  <text x="890" y="385" text-anchor="middle" font-size="40" font-weight="900" fill="#c084fc" opacity="0.7">→</text>

  <!-- Box4: ? (점선 박스 — 미래) -->
  <rect x="910" y="300" rx="14" width="220" height="140" fill="#c084fc" opacity="0.08"/>
  <rect x="910" y="300" rx="14" width="220" height="140" fill="none" stroke="#c084fc" stroke-width="3" stroke-dasharray="8,6"/>
  <text x="1020" y="345" text-anchor="middle" font-size="20" font-weight="900" fill="#c084fc" letter-spacing="1">미래?</text>
  <text x="1020" y="410" text-anchor="middle" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-2">?</text>

  <!-- 강조 카피 -->
  <rect x="70" y="490" width="14" height="70" fill="#f5ff3d"/>
  <text x="100" y="530" font-size="50" font-weight="900" fill="#f5ff3d" letter-spacing="-2">NP 뼈대는 평생 안 바뀐다</text>
  <text x="100" y="575" font-size="20" font-weight="700" fill="#ffffff" opacity="0.9">📚 Pittenger 1993 검사 신뢰도 · Beebe 8기능 모델 인용</text>

  <!-- 비교 박스 (정국 vs V) -->
  <g transform="translate(70, 620)">
    <rect x="0" y="0" rx="12" width="1060" height="120" fill="#ffffff" opacity="0.08"/>
    <rect x="0" y="0" rx="12" width="1060" height="120" fill="none" stroke="#00e5ff" stroke-width="2"/>
    <text x="30" y="40" font-size="22" font-weight="900" fill="#00e5ff">정국 vs V — 같은 BTS, 다른 변화 패턴</text>
    <text x="30" y="75" font-size="18" font-weight="700" fill="#ffffff">정국: IxxP 빌딩 안에서 층 이동 (3회)</text>
    <text x="30" y="102" font-size="18" font-weight="700" fill="#ffffff">V: NP 빌딩 사이 횡단 (4회 — E↔I, F↔T 모두 흔들림)</text>
  </g>

  <!-- 하단 태그라인 -->
  <rect x="70" y="780" width="14" height="58" fill="#f5ff3d"/>
  <text x="100" y="810" font-size="26" font-weight="900" fill="#ffffff">군대가 바꾼 V의 인지기능 재배치</text>
  <text x="100" y="842" font-size="18" font-weight="700" fill="#ffffff" opacity="0.85">Ne 주기능 + 보조 Fi → Ti 횡단 · 2025년 6월 위버스 ENTP 발언 분석</text>

  <!-- 우하단 브랜드 -->
  <text x="1130" y="862" text-anchor="end" font-size="16" font-weight="800" fill="#f5ff3d" opacity="0.9">192types.co.kr</text>
</svg>
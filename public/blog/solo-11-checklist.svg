      <text x="664" y="295" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">04</text>
      <text x="700" y="284" font-size="21" font-weight="700" fill="#171717">결과물 없이도 과정을 즐긴다</text>
      <text x="700" y="308" font-size="17" font-weight="500" fill="#6b7280">SNS 업로드 없이 그냥 재미있어서 한다</text>

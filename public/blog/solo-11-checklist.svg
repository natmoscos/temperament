      <rect x="102" y="266" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
      <text x="124" y="295" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">03</text>
      <text x="160" y="284" font-size="21" font-weight="700" fill="#171717">한 번에 하나만 깊게 몰입한다</text>
      <text x="160" y="308" font-size="17" font-weight="500" fill="#6b7280">멀티태스킹보다 싱글태스킹 선호</text>

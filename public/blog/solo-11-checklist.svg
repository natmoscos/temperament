      <rect x="620" y="556" width="500" height="90" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="620" y="556" width="6" height="90" rx="3" fill="#0891b2"/>
      <rect x="642" y="578" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>

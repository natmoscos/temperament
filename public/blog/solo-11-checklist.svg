<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="58" text-anchor="middle" font-size="45" font-weight="800" fill="#171717">혼놀 고수 체크리스트 · 10가지</text>
  <text x="600" y="90" text-anchor="middle" font-size="21" font-weight="500" fill="#6b7280">8개 이상 YES면 당신은 이미 혼놀 상위 10%</text>
  
    <g>
      <rect x="80" y="140" width="500" height="90" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="80" y="140" width="6" height="90" rx="3" fill="#0891b2"/>
      <rect x="102" y="162" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
      <text x="124" y="191" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">01</text>
      <text x="160" y="180" font-size="21" font-weight="700" fill="#171717">정기적으로 스마트폰을 꺼둔다</text>
      <text x="160" y="204" font-size="17" font-weight="500" fill="#6b7280">하루 30분 이상 완전 차단 시간 확보</text>
      <!-- checkbox -->
      <rect x="530" y="170" width="28" height="28" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
      <path d="M 537 184 l 5 5 l 10 -12" fill="none" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g>
      <rect x="620" y="140" width="500" height="90" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="620" y="140" width="6" height="90" rx="3" fill="#0891b2"/>
      <rect x="642" y="162" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
      <text x="664" y="191" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">02</text>
      <text x="700" y="180" font-size="21" font-weight="700" fill="#171717">혼자만의 공간과 루틴이 있다</text>
      <text x="700" y="204" font-size="17" font-weight="500" fill="#6b7280">카페·책상 등 "내 자리"를 물리적으로 확보</text>

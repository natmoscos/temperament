  <!-- score band -->
  <g transform="translate(160, 790)">
    <rect x="0" y="0" width="880" height="60" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="1"/>
    <text x="30" y="24" font-size="18" font-weight="800" fill="#0e7490">당신의 점수는?</text>
    <text x="30" y="44" font-size="17" font-weight="500" fill="#374151">0~3 입문자  ·  4~7 중급자  ·  8~9 고수  ·  10 마스터 (INTP 수준)</text>
  </g>
  

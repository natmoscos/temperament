      <rect x="642" y="474" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
      <text x="664" y="503" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">08</text>
      <text x="700" y="492" font-size="21" font-weight="700" fill="#171717">혼자 식당·영화관에 갈 수 있다</text>
      <text x="700" y="516" font-size="17" font-weight="500" fill="#6b7280">타인의 시선을 불편해하지 않는다</text>

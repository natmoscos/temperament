      <text x="700" y="596" font-size="21" font-weight="700" fill="#171717">창작·학습에 시간을 쓴다</text>
      <text x="700" y="620" font-size="17" font-weight="500" fill="#6b7280">소비보다 생산의 비중이 절반은 넘는다</text>
      <!-- checkbox -->

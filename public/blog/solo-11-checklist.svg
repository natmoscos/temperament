      <rect x="620" y="348" width="500" height="90" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="620" y="348" width="6" height="90" rx="3" fill="#0891b2"/>
      <rect x="642" y="370" width="44" height="44" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
      <text x="664" y="399" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">06</text>
      <text x="700" y="388" font-size="21" font-weight="700" fill="#171717">나만의 취향을 알고 있다</text>
      <text x="700" y="412" font-size="17" font-weight="500" fill="#6b7280">추천·유행 없이 내가 좋아하는 것을 고를 수 있다</text>

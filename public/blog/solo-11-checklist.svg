      <text x="124" y="399" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">05</text>
      <text x="160" y="388" font-size="21" font-weight="700" fill="#171717">무료함을 불편해하지 않는다</text>
      <text x="160" y="412" font-size="17" font-weight="500" fill="#6b7280">자극 없이도 5분 이상 편안하게 있을 수 있다</text>

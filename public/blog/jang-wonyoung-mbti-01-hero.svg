<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg-w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3bac"/>
      <stop offset="50%" stop-color="#ff006e"/>
      <stop offset="100%" stop-color="#1446ff"/>
    </linearGradient>
    <radialGradient id="glow-w" cx="20%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#f5ff3d" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f5ff3d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="900" fill="url(#bg-w)"/>
  <rect width="1200" height="900" fill="url(#glow-w)"/>

  <!-- 좌상단 뱃지: 본인 입 공개 -->
  <rect x="70" y="80" rx="8" width="360" height="52" fill="#0a0a0a"/>
  <text x="250" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#f5ff3d" letter-spacing="1">✦ 본인 입으로 공개</text>

  <!-- 상단 이름 -->
  <text x="70" y="250" font-size="90" font-weight="900" fill="#ffffff" letter-spacing="-3">IVE 장원영</text>

  <!-- 반전 섹션: ENFP? 취소선 (글자 중앙 통과) -->
  <text x="70" y="400" font-size="88" font-weight="900" fill="#ffffff" opacity="0.85" letter-spacing="-2">ENFP 아냐</text>
  <line x1="55" y1="365" x2="625" y2="365" stroke="#f5ff3d" stroke-width="12"/>

  <!-- 메인 카피: ENTJ 초대형 -->
  <text x="70" y="660" font-size="290" font-weight="900" fill="#f5ff3d" letter-spacing="-10" stroke="#0a0a0a" stroke-width="3">ENTJ</text>

  <!-- 하단 태그라인 -->
  <rect x="70" y="750" width="14" height="58" fill="#f5ff3d"/>
  <text x="100" y="780" font-size="28" font-weight="900" fill="#ffffff">럭키비키 뒤에 숨은 사령관의 두뇌</text>
  <text x="100" y="812" font-size="20" font-weight="700" fill="#ffffff" opacity="0.92">2025년 덱스 냉터뷰 최초 공개 · Te 주기능 완전 해부</text>

  <!-- 우측 포인트 스티커 -->
  <g transform="translate(820, 230)">
    <circle cx="140" cy="140" r="140" fill="#f5ff3d"/>
    <text x="140" y="105" text-anchor="middle" font-size="28" font-weight="900" fill="#0a0a0a">대중 인식</text>
    <text x="140" y="145" text-anchor="middle" font-size="28" font-weight="900" fill="#0a0a0a" opacity="0.55">ENFP</text>
    <line x1="65" y1="140" x2="215" y2="140" stroke="#ff006e" stroke-width="7"/>
    <text x="140" y="185" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">실제 공개</text>
    <text x="140" y="220" text-anchor="middle" font-size="38" font-weight="900" fill="#ff006e">ENTJ ✓</text>
  </g>

  <!-- 우하단 브랜드 -->
  <text x="1130" y="862" text-anchor="end" font-size="16" font-weight="800" fill="#ffffff" opacity="0.95">192types.co.kr</text>
</svg>
    <text x="1080" y="786" text-anchor="middle" font-size="17.6" font-weight="800" fill="#fff">ENTJ</text>
  

  <!-- Currency symbols decoration -->
  <text x="350" y="280" font-size="40" font-weight="800" fill="#65a30d" opacity="0.15">₩</text>
  <text x="880" y="350" font-size="36" font-weight="800" fill="#65a30d" opacity="0.15">$</text>
  <text x="400" y="670" font-size="32" font-weight="800" fill="#65a30d" opacity="0.15">€</text>
  <text x="820" y="650" font-size="44" font-weight="800" fill="#65a30d" opacity="0.15">¥</text>

  <!-- Center card -->
  <rect x="270" y="220" width="660" height="280" rx="24" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="275" text-anchor="middle" font-size="17" font-weight="600" fill="#6b7280" letter-spacing="8">MBTI ECONOMICS · 2026</text>
  <text x="600" y="345" text-anchor="middle" font-size="46" font-weight="800" fill="#171717">MBTI 재테크 DNA</text>

    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#hG)"/>

  <!-- Scattered coins with MBTI types -->
  
    <circle cx="160" cy="260" r="62" fill="#0891b2" opacity="0.1"/>

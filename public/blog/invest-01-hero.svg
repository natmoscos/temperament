  <text x="600" y="680" text-anchor="middle" font-size="13" font-weight="500" fill="#6b7280">32가지 지출 패턴 · 16가지 투자 성향 · 실전 액션 체크리스트</text>
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · MBTI 경제학 시리즈</text>

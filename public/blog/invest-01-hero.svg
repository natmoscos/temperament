  <line x1="460" y1="413" x2="740" y2="413" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="438" text-anchor="middle" font-size="15" font-weight="500" fill="#6b7280">16유형 × 4기질 × 3가지 머니 프로파일</text>
  <text x="600" y="465" text-anchor="middle" font-size="13" font-weight="500" fill="#9ca3af">소비 · 저축 · 투자 · 리스크 · 커플 돈궁합</text>

  <g transform="translate(300, 540)">
    
      <g transform="translate(0,0)">
        <circle cx="12" cy="24" r="9" fill="#0891b2"/>
        <text x="28" y="29" font-size="13" font-weight="600" fill="#374151">NT · 전략가</text>
      </g>
    
      <g transform="translate(155,0)">
        <circle cx="12" cy="24" r="9" fill="#e11d48"/>
        <text x="28" y="29" font-size="13" font-weight="600" fill="#374151">NF · 가치기반</text>
      </g>
    
      <g transform="translate(330,0)">
        <circle cx="12" cy="24" r="9" fill="#059669"/>
        <text x="28" y="29" font-size="13" font-weight="600" fill="#374151">SJ · 안정형</text>
      </g>
    
      <g transform="translate(490,0)">

    <text x="160" y="266" text-anchor="middle" font-size="20.8" font-weight="800" fill="#fff">INTJ</text>
  
    <circle cx="1040" cy="240" r="64" fill="#0891b2" opacity="0.1"/>
    <circle cx="1040" cy="240" r="54" fill="#0891b2"/>
    <text x="1040" y="246" text-anchor="middle" font-size="21.6" font-weight="800" fill="#fff">INTP</text>
  
    <circle cx="200" cy="560" r="58" fill="#059669" opacity="0.1"/>
    <circle cx="200" cy="560" r="48" fill="#059669"/>
    <text x="200" y="566" text-anchor="middle" font-size="19.200000000000003" font-weight="800" fill="#fff">ISTJ</text>
  
    <circle cx="1010" cy="590" r="56" fill="#f59e0b" opacity="0.1"/>

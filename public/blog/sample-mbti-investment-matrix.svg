<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="32" font-weight="800" fill="#171717">
    내 MBTI의 재테크 DNA
  </text>
  <text x="600" y="92" text-anchor="middle" font-size="16" font-weight="500" fill="#6b7280">
    16유형을 리스크 선호 × 투자 시야로 펼쳐보면
  </text>

  <!-- Matrix plot area: x=150..1050, y=160..760 -->
  <!-- Quadrant backgrounds -->
  <rect x="150" y="160" width="450" height="300" fill="#ecfdf5" opacity="0.55"/>   <!-- TL: emerald-50 -->
  <rect x="600" y="160" width="450" height="300" fill="#ecfeff" opacity="0.55"/>   <!-- TR: cyan-50 -->
  <rect x="150" y="460" width="450" height="300" fill="#fff1f2" opacity="0.55"/>   <!-- BL: rose-50 -->
  <rect x="600" y="460" width="450" height="300" fill="#fffbeb" opacity="0.55"/>   <!-- BR: amber-50 -->

  <!-- Quadrant labels -->
  <text x="170" y="190" font-size="13" font-weight="700" fill="#047857" letter-spacing="2">SJ · 관리자형</text>
  <text x="170" y="208" font-size="11" fill="#065f46">보수적 저축가 · 연금 장기운용</text>

  <text x="1030" y="190" text-anchor="end" font-size="13" font-weight="700" fill="#0e7490" letter-spacing="2">NT · 전략가형</text>
  <text x="1030" y="208" text-anchor="end" font-size="11" fill="#155e75">가치투자 · 레버리지 포트폴리오</text>

  <text x="170" y="490" font-size="13" font-weight="700" fill="#be123c" letter-spacing="2">NF · 이상주의형</text>
  <text x="170" y="508" font-size="11" fill="#881337">ESG · 가치기반 투자 선호</text>

  <text x="1030" y="490" text-anchor="end" font-size="13" font-weight="700" fill="#b45309" letter-spacing="2">SP · 기회포착형</text>
  <text x="1030" y="508" text-anchor="end" font-size="11" fill="#92400e">단타·스윙 · 부업·사이드잡 병행</text>

  <!-- Axes -->
  <line x1="150" y1="460" x2="1050" y2="460" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="600" y1="160" x2="600" y2="760" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="1050,460 1040,455 1040,465" fill="#9ca3af"/>
  <polygon points="600,160 595,170 605,170" fill="#9ca3af"/>
  <polygon points="150,460 160,455 160,465" fill="#9ca3af"/>
  <polygon points="600,760 595,750 605,750" fill="#9ca3af"/>

  <!-- Axis labels -->
  <text x="140" y="465" text-anchor="end" font-size="13" font-weight="600" fill="#4b5563">리스크 회피</text>
  <text x="1060" y="465" font-size="13" font-weight="600" fill="#4b5563">리스크 추구</text>
  <text x="600" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#4b5563">장기 투자 시야</text>
  <text x="600" y="780" text-anchor="middle" font-size="13" font-weight="600" fill="#4b5563">단기 수익 추구</text>

  <!-- ============ Type bubbles ============ -->
  <!-- TL: SJ — emerald-600 #059669 -->
  <g font-family="inherit">
    <circle cx="240" cy="260" r="30" fill="#059669"/>
    <text x="240" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ISTJ</text>

    <circle cx="340" cy="320" r="30" fill="#059669"/>
    <text x="340" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ESTJ</text>

    <circle cx="460" cy="250" r="30" fill="#10b981"/>
    <text x="460" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ISFJ</text>

    <circle cx="530" cy="380" r="30" fill="#10b981"/>
    <text x="530" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ESFJ</text>
  </g>

  <!-- TR: NT — cyan-600 #0891b2 -->
  <g font-family="inherit">
    <circle cx="750" cy="230" r="30" fill="#0891b2"/>
    <text x="750" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">INTJ</text>

    <circle cx="880" cy="280" r="30" fill="#0891b2"/>
    <text x="880" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ENTJ</text>

    <circle cx="700" cy="380" r="30" fill="#06b6d4"/>
    <text x="700" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">INTP</text>

    <circle cx="960" cy="360" r="30" fill="#06b6d4"/>
    <text x="960" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ENTP</text>
  </g>

  <!-- BL: NF — rose-600 #e11d48 -->
  <g font-family="inherit">
    <circle cx="280" cy="540" r="30" fill="#e11d48"/>
    <text x="280" y="545" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">INFJ</text>

    <circle cx="420" cy="600" r="30" fill="#e11d48"/>
    <text x="420" y="605" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">INFP</text>

    <circle cx="360" cy="690" r="30" fill="#f43f5e"/>
    <text x="360" y="695" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ENFJ</text>

    <circle cx="520" cy="660" r="30" fill="#f43f5e"/>
    <text x="520" y="665" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ENFP</text>
  </g>

  <!-- BR: SP — amber-600 #d97706 -->
  <g font-family="inherit">
    <circle cx="680" cy="540" r="30" fill="#d97706"/>
    <text x="680" y="545" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ISTP</text>

    <circle cx="840" cy="590" r="30" fill="#d97706"/>
    <text x="840" y="595" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ESTP</text>

    <circle cx="760" cy="680" r="30" fill="#f59e0b"/>
    <text x="760" y="685" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ISFP</text>

    <circle cx="950" cy="700" r="30" fill="#f59e0b"/>
    <text x="950" y="705" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">ESFP</text>
  </g>

  <!-- Legend -->
  <g transform="translate(150, 810)">
    <rect x="0" y="0" width="900" height="60" fill="#fff" stroke="#e5e7eb" stroke-width="1" rx="8"/>

    <circle cx="40" cy="30" r="10" fill="#059669"/>
    <text x="60" y="35" font-size="13" font-weight="600" fill="#374151">SJ 관리자형</text>
    <text x="60" y="50" font-size="11" fill="#6b7280">안정·계획 중심</text>

    <circle cx="260" cy="30" r="10" fill="#0891b2"/>
    <text x="280" y="35" font-size="13" font-weight="600" fill="#374151">NT 전략가형</text>
    <text x="280" y="50" font-size="11" fill="#6b7280">분석·장기비전</text>

    <circle cx="480" cy="30" r="10" fill="#e11d48"/>
    <text x="500" y="35" font-size="13" font-weight="600" fill="#374151">NF 이상주의형</text>
    <text x="500" y="50" font-size="11" fill="#6b7280">가치·공감 기반</text>

    <circle cx="700" cy="30" r="10" fill="#d97706"/>
    <text x="720" y="35" font-size="13" font-weight="600" fill="#374151">SP 기회포착형</text>
    <text x="720" y="50" font-size="11" fill="#6b7280">즉각·실전 지향</text>
  </g>

  <!-- Watermark -->
  <text x="1180" y="890" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.8">
    192types.co.kr · MBTI 경제학 시리즈
  </text>
</svg>

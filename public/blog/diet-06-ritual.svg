<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="50" text-anchor="middle" font-size="39" font-weight="800" fill="#171717">기질별 다이어트 체크리스트</text>
  <text x="600" y="78" text-anchor="middle" font-size="18" font-weight="500" fill="#6b7280">네 기질 최적화된 4단계 · 오늘부터 1개씩</text>

  
      <g transform="translate(60,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#f43f5e"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#f43f5e">🌟 다혈질 다이어트 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENFP · ESFP · ESFJ · ENFJ</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 감정 폭식 인식 → 10분 산책으로 대체</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 파트너 1명 함께 — 다혈질은 혼자 실패율 80%</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 재미 요소 필수 — 클래스·크루 참여</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 완벽주의 포기 — 치팅 데이 주 1회 허용</text>
        
      </g>
    
      <g transform="translate(620,115)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0891b2"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0891b2">⚡ 담즙질 다이어트 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ENTJ · ESTJ · ENTP · ESTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 명확한 수치 목표 + 2주 체크인</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 과도한 공격적 세팅 주의 (부상 위험)</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 감량 후 유지 전략 미리 설계</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 통제 내려놓기 — 휴식도 프로그램</text>
        
      </g>
    
      <g transform="translate(60,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#059669"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#059669">🌾 점액질 다이어트 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">ISFJ · ISTJ · INFP · ISFP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 같은 시간·같은 장소 루틴 고정</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 식단 3~5가지 반복 (선택 피로 감소)</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 기록 + 월 진행 리뷰</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 변화는 느리지만 확실 — 조급해 말기</text>
        
      </g>
    
      <g transform="translate(620,490)">
        <rect width="520" height="340" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
        <rect width="8" height="340" rx="4" fill="#0e7490"/>
        <text x="28" y="42" font-size="28" font-weight="800" fill="#0e7490">🌙 우울질 다이어트 루틴</text>
        <text x="28" y="66" font-size="17" font-weight="600" fill="#6b7280">INTJ · INFJ · INTP · ISTP</text>
        
          <text x="28" y="115" font-size="18" font-weight="600" fill="#374151">① 데이터 기반 접근 — 체지방·근육량 추적</text>
        
          <text x="28" y="167" font-size="18" font-weight="600" fill="#374151">② 이론 학습만 하지 말고 실행 주간 할당</text>
        
          <text x="28" y="219" font-size="18" font-weight="600" fill="#374151">③ 혼자 운동 + 월 1회 코치 점검</text>
        
          <text x="28" y="271" font-size="18" font-weight="600" fill="#374151">④ 몸 신호 과분석 금지 — 평균값으로 판단</text>
        
      </g>
    
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 다이어트 리포트</text>
</svg>
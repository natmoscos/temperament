<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <defs>
    <linearGradient id="fBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#fBg)"/>

  <!-- Floating heart emojis -->
  <text x="150" y="200" font-size="40" opacity="0.2">🤝</text>
  <text x="900" y="180" font-size="45" opacity="0.2">💜</text>
  <text x="220" y="720" font-size="45" opacity="0.2">✨</text>
  <text x="950" y="720" font-size="40" opacity="0.2">👯</text>
  <text x="550" y="150" font-size="35" opacity="0.15">🫂</text>
  <text x="550" y="780" font-size="35" opacity="0.15">💫</text>

  <!-- Two connected circles -->
  <g opacity="0.25">
    <circle cx="450" cy="450" r="130" fill="#8b5cf6" stroke="#6d28d9" stroke-width="4"/>
    <circle cx="750" cy="450" r="130" fill="#ec4899" stroke="#e11d48" stroke-width="4"/>
    <text x="450" y="465" text-anchor="middle" font-size="30" font-weight="800" fill="#6d28d9">YOU</text>
    <text x="750" y="465" text-anchor="middle" font-size="30" font-weight="800" fill="#e11d48">FRIEND</text>
  </g>

  <!-- Center brand card -->
  <rect x="120" y="270" width="960" height="400" rx="36" fill="#ffffff" stroke="#6d28d9" stroke-width="4" opacity="0.97"/>
  <text x="600" y="345" text-anchor="middle" font-size="30" font-weight="800" fill="#6d28d9">192TYPES · FRIENDSHIP REPORT 2026</text>
  <text x="600" y="450" text-anchor="middle" font-size="78" font-weight="900" fill="#171717">MBTI 친구 관계</text>
  <text x="600" y="525" text-anchor="middle" font-size="40" font-weight="700" fill="#374151">평생 절친 궁합 + 손절 시그널</text>
  <text x="600" y="620" text-anchor="middle" font-size="24" font-weight="600" fill="#6b7280">너의 우정 DNA · 절친 유형 · 손절 시그널 완전분석</text>
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr · 친구 관계 리포트</text>
</svg>
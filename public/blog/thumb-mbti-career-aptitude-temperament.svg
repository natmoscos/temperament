<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#fafafa"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Decorative emojis in background -->
  <text x="180" y="200" font-size="60" opacity="0.18">💼</text>
  <text x="960" y="180" font-size="60" opacity="0.18">📈</text>
  <text x="200" y="760" font-size="60" opacity="0.18">🎯</text>
  <text x="940" y="740" font-size="60" opacity="0.18">🚀</text>

  <!-- Center white card -->
  <rect x="90" y="220" width="1020" height="460" rx="36" fill="#ffffff" stroke="#047857" stroke-width="4" opacity="0.97"/>

  <!-- Brand label -->
  <text x="600" y="300" text-anchor="middle" font-size="28" font-weight="700" fill="#047857" letter-spacing="6">192TYPES · CAREER</text>

  <!-- Title line 1 -->
  <text x="600" y="470" text-anchor="middle" font-size="82" font-weight="900" fill="#171717">유형별 직업 적성</text>

  

  <!-- Subtitle -->
  
  <line x1="380" y1="540" x2="820" y2="540" stroke="#047857" stroke-width="2" opacity="0.35"/>
  <text x="600" y="590" text-anchor="middle" font-size="24" font-weight="600" fill="#6b7280">기질이 바꾸는 커리어 방향</text>
  
  
<text x="1180" y="892" text-anchor="end" font-size="10" font-weight="500" fill="#9ca3af" opacity="0.85">192types.co.kr</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#faf8f5"/>

  <text x="600" y="130" text-anchor="middle" font-size="48" font-weight="900" fill="#1a1a1a">SBTI vs MBTI — 완전 다른 두 개</text>
  <rect x="500" y="160" width="200" height="6" fill="#6366f1"/>
  
        <rect x="100" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
        <circle cx="150" cy="280" r="30" fill="#10b981"/>
        <text x="150" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">S</text>
        <text x="200" y="290" font-size="30" font-weight="900" fill="#1a1a1a">SBTI (진짜)</text>
        <foreignObject x="140" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">Science-Based Targets initiative — 기업 기후 목표 국제 이니셔티브. ESG 담당자용.</div>
        </foreignObject>
      

        <rect x="610" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
        <circle cx="660" cy="280" r="30" fill="#6366f1"/>
        <text x="660" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">M</text>
        <text x="710" y="290" font-size="30" font-weight="900" fill="#1a1a1a">MBTI (아마 이거)</text>
        <foreignObject x="650" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">16가지 성격 유형 검사. 칼 융 인지기능 이론 기반. 일상 심리 분석.</div>
        </foreignObject>
      

        <rect x="100" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
        <circle cx="150" cy="580" r="30" fill="#f59e0b"/>
        <text x="150" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">🔄</text>
        <text x="200" y="590" font-size="30" font-weight="900" fill="#1a1a1a">오타 가능성 99%</text>
        <foreignObject x="140" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">키보드에서 S와 M이 나란히 있어서 흔한 실수. 민지도 나도 종종 틀림.</div>
        </foreignObject>
      

        <rect x="610" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#f43f5e" stroke-width="3"/>
        <circle cx="660" cy="580" r="30" fill="#f43f5e"/>
        <text x="660" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">192</text>
        <text x="710" y="590" font-size="30" font-weight="900" fill="#1a1a1a">대안: 192types</text>
        <foreignObject x="650" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">같은 MBTI인데 왜 다를까? 기질론까지 합친 192가지 정밀 검사.</div>
        </foreignObject>
      
  
<text x="1180" y="892" text-anchor="end" font-size="14" font-weight="600" fill="#9ca3af" opacity="0.85">192types.co.kr</text>
</svg>
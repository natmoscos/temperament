<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
<rect width="1200" height="900" fill="#faf8f5"/>

  <text x="600" y="130" text-anchor="middle" font-size="48" font-weight="900" fill="#1a1a1a">MBTI별 기록 스타일 패턴</text>
  <rect x="500" y="160" width="200" height="6" fill="#6366f1"/>
  
        <rect x="100" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
        <circle cx="150" cy="280" r="30" fill="#6366f1"/>
        <text x="150" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">📊</text>
        <text x="200" y="290" font-size="30" font-weight="900" fill="#1a1a1a">SJ·NT 데이터 수집가</text>
        <foreignObject x="140" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">구조화된 앱 최적. 세트 여러 개, 정량화 가능한 것 위주. 1년 쌓으면 분석 자료.</div>
        </foreignObject>
      

        <rect x="610" y="220" width="480" height="260" rx="24" fill="#ffffff" stroke="#f43f5e" stroke-width="3"/>
        <circle cx="660" cy="280" r="30" fill="#f43f5e"/>
        <text x="660" y="288" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">💭</text>
        <text x="710" y="290" font-size="30" font-weight="900" fill="#1a1a1a">NF 감정 폭발가</text>
        <foreignObject x="650" y="320" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">규칙성 X. 감정 터질 때만 기록. 매일 강제하면 앱 지워. 필요성 중심.</div>
        </foreignObject>
      

        <rect x="100" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
        <circle cx="150" cy="580" r="30" fill="#f59e0b"/>
        <text x="150" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">📷</text>
        <text x="200" y="590" font-size="30" font-weight="900" fill="#1a1a1a">SP 순간 캡처러</text>
        <foreignObject x="140" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">글 대신 사진 + 한 줄. 셋로그 아닌 사진 앱이 나음. 실시간 감각 포착.</div>
        </foreignObject>
      

        <rect x="610" y="520" width="480" height="260" rx="24" fill="#ffffff" stroke="#0ea5e9" stroke-width="3"/>
        <circle cx="660" cy="580" r="30" fill="#0ea5e9"/>
        <text x="660" y="588" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">🪞</text>
        <text x="710" y="590" font-size="30" font-weight="900" fill="#1a1a1a">INFJ 내면 관찰가</text>
        <foreignObject x="650" y="620" width="400" height="140">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;font-size:18px;line-height:1.5;color:#4b5563;font-weight:500;">주말 깊은 회고. 한 번에 길게. "이번 주 불편함 3가지" 같은 주제로.</div>
        </foreignObject>
      
  
<text x="1180" y="892" text-anchor="end" font-size="14" font-weight="600" fill="#9ca3af" opacity="0.85">192types.co.kr</text>
</svg>